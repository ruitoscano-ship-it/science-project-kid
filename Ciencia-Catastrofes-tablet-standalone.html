<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#FFF6E0" />
  <title>Ciência vs. Catástrofes — Simulador (standalone)</title>
  <!-- Ficheiro único: copia para o tablet e abre no Safari/Chrome com Wi‑Fi (carrega React e Babel da Internet). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" />
  <style>
/* ===== Reset / base ===== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Nunito', system-ui, sans-serif;
  background: #FFF6E0;
  color: #2C2A4A;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
:root {
  --cream: #FFF6E0;
  --sky: #9FD9F0;
  --sky-deep: #7FC8E8;
  --sun: #FFD23F;
  --grass: #6BBE5E;
  --grass-deep: #5B8F4A;
  --dirt: #C9A06B;
  --terracotta: #E8845C;
  --roof: #A85439;
  --ink: #2C2A4A;
  --ink-soft: #6B6890;
  --paper: #FFFDF7;
  --water: #4A9FD9;
  --fire: #FF6B3D;
  --shadow: 0 6px 0 rgba(44, 42, 74, 0.12), 0 12px 28px rgba(44, 42, 74, 0.10);
  --shadow-sm: 0 3px 0 rgba(44, 42, 74, 0.10), 0 6px 14px rgba(44, 42, 74, 0.08);
}

/* ===== Layout ===== */
#root { min-height: 100vh; }
.app {
  max-width: 1440px;
  margin: 0 auto;
  padding: 24px;
}
.h-title {
  font-family: 'Fredoka', system-ui, sans-serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}

/* ===== Home ===== */
.home-hero {
  position: relative;
  background: linear-gradient(180deg, #9FD9F0 0%, #B8E5F5 60%, #FFF6E0 100%);
  border-radius: 32px;
  padding: 32px 32px 40px;
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 4px solid #fff;
}
.home-hero .sun {
  position: absolute; top: 28px; right: 60px;
  width: 90px; height: 90px; border-radius: 50%;
  background: radial-gradient(circle, #FFE066 0%, #FFD23F 60%, #FFC107 100%);
  box-shadow: 0 0 60px rgba(255, 210, 63, 0.6);
}
.home-hero .cloud {
  position: absolute; background: #fff; border-radius: 50px;
  opacity: 0.9;
}
.home-hero .cloud.c1 { top: 50px; left: 8%; width: 110px; height: 28px; }
.home-hero .cloud.c1::before, .home-hero .cloud.c1::after { content:''; position:absolute; background:#fff; border-radius:50%; }
.home-hero .cloud.c1::before { width:40px; height:40px; top:-14px; left:18px; }
.home-hero .cloud.c1::after { width:32px; height:32px; top:-10px; left:55px; }
.home-hero .cloud.c2 { top: 110px; left: 38%; width: 80px; height: 20px; }
.home-hero .cloud.c2::before { content:''; position:absolute; background:#fff; border-radius:50%; width:30px; height:30px; top:-10px; left:22px; }

.home-header {
  display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  position: relative; z-index: 2;
}
.home-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; border: 3px solid var(--ink);
  border-radius: 100px; padding: 6px 14px;
  font-weight: 800; font-size: 13px; color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.home-badge .dot { width: 10px; height: 10px; border-radius: 50%; background: #6BBE5E; }
.home-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(36px, 5vw, 64px);
  line-height: 1;
  margin: 16px 0 6px;
  color: var(--ink);
  max-width: 900px;
  letter-spacing: -0.02em;
  position: relative; z-index: 2;
}
.home-title .accent { color: var(--terracotta); }
.home-subtitle {
  font-size: clamp(16px, 1.6vw, 20px);
  color: var(--ink-soft);
  max-width: 720px;
  margin: 0;
  position: relative; z-index: 2;
  line-height: 1.45;
}

/* Tabs na página inicial */
.home-tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin: 22px 0 8px;
  padding: 0 8px;
}
.home-tab {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 17px;
  padding: 12px 28px;
  border-radius: 100px;
  border: 3px solid var(--ink);
  background: #fff;
  color: var(--ink-soft);
  box-shadow: var(--shadow-sm);
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}
.home-tab:hover {
  transform: translateY(-2px);
  color: var(--ink);
}
.home-tab.on {
  background: var(--ink);
  color: #FFD23F;
  box-shadow: var(--shadow-sm);
}
.home-tab-panel {
  margin-top: 8px;
}

/* Aprender mais */
.learn-more {
  margin-top: 8px;
  padding: 8px 4px 0;
}
.learn-more-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(24px, 3vw, 32px);
  margin: 0 0 12px;
  color: var(--ink);
  text-align: center;
  letter-spacing: -0.02em;
}
.learn-more-lead {
  font-size: clamp(15px, 1.45vw, 17px);
  font-weight: 700;
  color: var(--ink-soft);
  line-height: 1.55;
  max-width: 820px;
  margin: 0 auto 28px;
  text-align: center;
}
.learn-more-stack {
  display: flex;
  flex-direction: column;
  gap: 22px;
  max-width: 900px;
  margin: 0 auto;
}
.learn-card {
  background: var(--paper);
  border: 4px solid var(--ink);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.learn-card-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  border-bottom: 3px solid var(--ink);
}
.learn-card-emoji {
  font-size: 40px;
  line-height: 1;
}
.learn-card-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 26px;
  margin: 0;
  color: var(--ink);
}
.learn-card-body {
  padding: 18px 22px 22px;
}
.learn-card-intro {
  margin: 0 0 18px;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.55;
}
.learn-subhead {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 17px;
  margin: 16px 0 8px;
  color: var(--terracotta);
}
.learn-list {
  margin: 0 0 4px;
  padding-left: 22px;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink-soft);
  line-height: 1.55;
}
.learn-list li + li {
  margin-top: 8px;
}
.learn-remember {
  margin: 18px 0 0;
  padding: 14px 16px;
  background: #FFF1B8;
  border: 3px solid var(--ink);
  border-radius: 16px;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.5;
}

/* ===== Home — pedagogical block (4.º ano) ===== */
.home-edu {
  margin-top: 28px;
  padding: 24px 22px 8px;
  background: var(--paper);
  border: 3px solid var(--ink);
  border-radius: 24px;
  box-shadow: var(--shadow-sm);
}
.home-edu-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: clamp(22px, 2.5vw, 28px);
  margin: 0 0 10px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.home-edu-lead {
  font-size: clamp(15px, 1.4vw, 17px);
  color: var(--ink);
  font-weight: 700;
  line-height: 1.5;
  margin: 0 0 18px;
  max-width: 900px;
}
.home-edu-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.home-edu-card {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 18px;
  padding: 14px 16px 16px;
  box-shadow: var(--shadow-sm);
}
.home-edu-card-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 17px;
  margin: 0 0 8px;
  color: var(--terracotta);
}
.home-edu-card-text {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* ===== Disaster grid ===== */
.section-h {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 36px 0 18px; padding: 0 8px;
}
.section-h h2 {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 28px; margin: 0; color: var(--ink);
  letter-spacing: -0.01em;
}
.section-h p { color: var(--ink-soft); margin: 0; font-size: 15px; }

.cards {
  display: grid; gap: 18px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.card {
  background: var(--paper);
  border: 3px solid var(--ink);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .15s ease, box-shadow .15s ease;
  cursor: pointer;
  position: relative;
  display: flex; flex-direction: column;
}
.card:hover:not(.disabled) {
  transform: translateY(-4px);
  box-shadow: 0 10px 0 rgba(44, 42, 74, 0.12), 0 18px 36px rgba(44, 42, 74, 0.12);
}
.card:active:not(.disabled) { transform: translateY(0); }
.card.disabled { opacity: 0.65; cursor: not-allowed; }
.card .preview {
  height: 160px; position: relative; overflow: hidden;
  border-bottom: 3px solid var(--ink);
}
.card .preview svg { display: block; width: 100%; height: 100%; }
.card-body {
  padding: 16px 18px 18px;
  display: flex; flex-direction: column; gap: 6px;
}
.card-title {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 22px; color: var(--ink); margin: 0;
  letter-spacing: -0.01em;
}
.card-desc { font-size: 14px; color: var(--ink-soft); margin: 0; line-height: 1.4; }
.card-foot {
  display: flex; align-items: center; gap: 10px; margin-top: 10px;
  font-size: 13px; font-weight: 800; color: var(--ink);
}
.card-foot .chip {
  background: #FFF1B8; border: 2px solid var(--ink);
  border-radius: 100px; padding: 3px 10px;
}
.card-foot .chip.green { background: #C9F0B4; }
.card-foot .chip.muted { background: #EDEAFF; }
.card .ribbon {
  position: absolute; top: 12px; right: 12px;
  background: var(--ink); color: #fff;
  font-weight: 800; font-size: 11px; letter-spacing: 0.05em;
  padding: 4px 10px; border-radius: 100px;
}

/* ===== Simulator screen ===== */
.sim-top {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 18px; flex-wrap: wrap;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: #fff; border: 3px solid var(--ink);
  border-radius: 100px; padding: 8px 16px;
  font-weight: 800; color: var(--ink); font-size: 14px;
  box-shadow: var(--shadow-sm);
}
.back-btn:hover { transform: translateY(-2px); }
.mode-switch {
  display: inline-flex; background: #fff; border: 3px solid var(--ink);
  border-radius: 100px; padding: 4px;
  box-shadow: var(--shadow-sm);
}
.mode-switch button {
  padding: 8px 18px; border-radius: 100px;
  font-weight: 800; font-size: 14px; color: var(--ink-soft);
}
.mode-switch button.on {
  background: var(--ink); color: #FFD23F;
}

.sim-grid {
  display: grid; gap: 18px;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
}
@media (max-width: 960px) { .sim-grid { grid-template-columns: 1fr; } }

.panel {
  background: var(--paper);
  border: 3px solid var(--ink);
  border-radius: 24px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.panel-head {
  padding: 16px 20px; border-bottom: 3px solid var(--ink);
  background: #FFF1B8;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.panel-head h3 {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 22px; margin: 0; color: var(--ink);
}
.budget-strip {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px 14px;
  padding: 10px 20px;
  background: #FFF1B8;
  border-bottom: 3px solid var(--ink);
}
.budget-strip-total {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--ink);
}
.budget-strip-hint {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink-soft);
  max-width: 420px;
  line-height: 1.35;
}
.var-pts {
  font-size: 11px;
  font-weight: 800;
  color: var(--ink-soft);
  margin-left: 2px;
}
.panel-body { padding: 18px 20px; }

/* Simulator — scenario intro */
.sim-teach {
  margin: 0;
  padding: 14px 20px;
  background: #E8F4FF;
  border-bottom: 3px solid var(--ink);
}
.sim-teach-label {
  margin: 0 0 6px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.sim-teach-text {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* Variable — strand badge + prevention text */
.strand {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding: 3px 10px;
  border-radius: 100px;
  border: 2px solid var(--ink);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.02em;
}
.strand.ciencia { background: #E8F4FF; color: var(--ink); }
.strand.tecnologia { background: #FFF1B8; color: var(--ink); }
.strand.ambos { background: #C9F0B4; color: var(--ink); }
.strand-emoji { font-size: 13px; line-height: 1; }

.var-prevent {
  margin-top: 10px;
  padding: 10px 12px;
  background: #F7F5FF;
  border: 2px solid var(--ink);
  border-radius: 14px;
}
.var-prevent-title {
  margin: 0 0 6px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--ink);
}
.var-prevent-text {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  line-height: 1.45;
}

/* Scene */
.scene-wrap { position: relative; aspect-ratio: 16/10; background:#9FD9F0; }
.scene-wrap svg { width: 100%; height: 100%; display: block; }
.scene-meter {
  position: absolute; top: 14px; left: 14px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.95); border: 3px solid var(--ink);
  border-radius: 100px; padding: 6px 14px 6px 8px;
  font-weight: 800; color: var(--ink); font-size: 13px;
  box-shadow: var(--shadow-sm);
}
.scene-meter .mlabel { color: var(--ink-soft); margin-right: 4px; font-size: 12px; }
.scene-meter .bar { width: 90px; height: 10px; background:#EDEAFF; border-radius: 100px; overflow:hidden; border:2px solid var(--ink); }
.scene-meter .bar > div { height: 100%; transition: width .35s ease, background .35s ease; }
.timer-pill {
  position: absolute; top: 14px; right: 14px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: #FFD23F;
  border-radius: 100px; padding: 8px 16px;
  font-weight: 900; font-size: 15px;
  font-variant-numeric: tabular-nums;
}
.timer-pill.warn { background: var(--terracotta); color: #fff; }
.timer-pill .pulse {
  width: 10px; height: 10px; background: #FFD23F; border-radius: 50%;
  animation: pulse 1s infinite;
}
.timer-pill.warn .pulse { background: #fff; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Mascot bubble */
.mascot-row {
  display: flex; align-items: flex-end; gap: 12px;
  padding: 14px 20px 0;
}
.mascot-row .bubble {
  background: #FFF1B8; border: 3px solid var(--ink);
  border-radius: 18px 18px 18px 4px;
  padding: 10px 14px; font-size: 14px; font-weight: 700; color: var(--ink);
  flex: 1; min-width: 0;
  box-shadow: var(--shadow-sm);
}

/* Variables (sliders) */
.var {
  border: 3px solid var(--ink);
  background: #fff;
  border-radius: 18px;
  padding: 12px 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.var-top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.var-icon {
  width: 40px; height: 40px; border-radius: 12px;
  border: 3px solid var(--ink);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.var-icon svg { width: 24px; height: 24px; }
.var-text { flex: 1; min-width: 0; }
.var-name {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 16px; margin: 0; color: var(--ink); line-height: 1.1;
}
.var-hint { font-size: 12px; color: var(--ink-soft); margin: 2px 0 0; line-height: 1.3; }
.var-val {
  font-weight: 900; color: var(--ink);
  background: #FFF1B8; border: 2px solid var(--ink);
  border-radius: 100px; padding: 4px 10px;
  font-size: 13px; min-width: 48px; text-align: center;
  font-variant-numeric: tabular-nums;
}

input[type=range].chunky {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 22px; background: transparent;
  cursor: pointer;
}
input[type=range].chunky::-webkit-slider-runnable-track {
  height: 14px; background: #EDEAFF;
  border: 3px solid var(--ink); border-radius: 100px;
}
input[type=range].chunky::-moz-range-track {
  height: 14px; background: #EDEAFF;
  border: 3px solid var(--ink); border-radius: 100px;
}
input[type=range].chunky::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--terracotta); border: 3px solid var(--ink);
  margin-top: -10px;
  box-shadow: 0 3px 0 rgba(44,42,74,0.2);
}
input[type=range].chunky::-moz-range-thumb {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--terracotta); border: 3px solid var(--ink);
  box-shadow: 0 3px 0 rgba(44,42,74,0.2);
}

/* Stats card */
.stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 14px 20px 0;
}
.stat {
  border: 3px solid var(--ink); border-radius: 18px;
  background: #fff; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.stat .ico {
  width: 38px; height: 38px; border-radius: 50%;
  border: 3px solid var(--ink);
  display: grid; place-items: center; flex-shrink: 0;
}
.stat .label { font-size: 12px; color: var(--ink-soft); font-weight: 700; }
.stat .val {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 22px; line-height: 1; color: var(--ink);
  font-variant-numeric: tabular-nums;
}

/* CTA buttons */
.cta {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--terracotta); color: #fff;
  border: 3px solid var(--ink); border-radius: 100px;
  padding: 12px 22px; font-weight: 900; font-size: 16px;
  box-shadow: 0 5px 0 var(--ink);
  transition: transform .1s ease, box-shadow .1s ease;
}
.cta:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--ink); }
.cta:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--ink); }
.cta.green { background: var(--grass); }
.cta.ghost { background: #fff; color: var(--ink); }
.cta.big { font-size: 18px; padding: 14px 26px; }

.sim-actions { padding: 14px 20px 20px; display: flex; gap: 10px; flex-wrap: wrap; }

/* ===== Results modal ===== */
.modal-bg {
  position: fixed; inset: 0; background: rgba(44, 42, 74, 0.55);
  display: grid; place-items: center; z-index: 100;
  padding: 20px;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--paper);
  border: 4px solid var(--ink);
  border-radius: 28px;
  max-width: 560px; width: 100%;
  box-shadow: 0 14px 0 rgba(44,42,74,0.18), 0 30px 50px rgba(0,0,0,0.3);
  overflow: hidden;
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-head {
  padding: 26px 26px 20px;
  background: #FFF1B8;
  border-bottom: 4px solid var(--ink);
  text-align: center;
}
.modal-head h2 {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 32px; margin: 0 0 4px; color: var(--ink);
}
.modal-head p { margin: 0; color: var(--ink-soft); font-weight: 700; }
.stars {
  display: flex; gap: 6px; justify-content: center; margin: 14px 0 4px;
}
.stars .star {
  width: 44px; height: 44px;
  filter: drop-shadow(0 3px 0 rgba(44,42,74,0.2));
}
.stars .star.off { opacity: 0.25; filter: grayscale(0.8); }
.modal-body { padding: 22px 26px 26px; max-height: min(62vh, 520px); overflow-y: auto; }
.modal-reflect {
  margin-top: 14px;
  padding: 14px 16px;
  border-radius: 16px;
  border: 3px solid var(--ink);
  text-align: left;
}
.result-stats + .modal-reflect { margin-top: 16px; }
.modal-reflect + .modal-reflect { margin-top: 12px; }
.modal-reflect.good { background: #E3F5DE; }
.modal-reflect.improve { background: #FFE8E0; }
.modal-reflect.tips { background: #EDE9FF; }
.modal-reflect-title {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 15px;
  margin: 0 0 10px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.modal-reflect-list {
  margin: 0;
  padding-left: 18px;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-soft);
  line-height: 1.5;
}
.modal-reflect-list li + li { margin-top: 8px; }
.result-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.fact {
  background: #E8F4FF; border: 3px solid var(--ink);
  border-radius: 18px; padding: 14px 16px;
  display: flex; gap: 12px; align-items: flex-start;
  margin-top: 14px;
}
.fact .ico {
  width: 38px; height: 38px; border-radius: 50%;
  background: #FFD23F; border: 3px solid var(--ink);
  display: grid; place-items: center; flex-shrink: 0;
}
.fact .title {
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  font-size: 14px; color: var(--ink);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin: 0 0 4px;
}
.fact p { margin: 0; font-size: 14px; line-height: 1.45; color: var(--ink); }
.modal-actions {
  display: flex; gap: 10px; padding: 0 26px 26px; flex-wrap: wrap;
}

/* Floating mascot on home */
.floating-mascot {
  position: absolute; right: 5%; bottom: 24px;
  width: 180px; height: 180px;
  z-index: 2;
}
@media (max-width: 720px) {
  .floating-mascot { width: 120px; height: 120px; right: 4%; bottom: 8px; }
  .home-hero { padding: 24px 20px 30px; }
  .home-hero .sun { width: 60px; height: 60px; top: 18px; right: 24px; }
}

/* Wobble for mascot */
@keyframes wobble {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
.wobble { animation: wobble 3s ease-in-out infinite; transform-origin: center bottom; }

/* Soft shake for disaster on mission end */
@keyframes shudder {
  0%, 100% { transform: translate(0,0); }
  25% { transform: translate(-2px, 1px); }
  50% { transform: translate(2px, -1px); }
  75% { transform: translate(-1px, 2px); }
}
.shudder { animation: shudder 0.35s ease-in-out 3; }

/* Rain droplets */
@keyframes droplet {
  0% { transform: translateY(-20px); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(420px); opacity: 0; }
}
.raindrop {
  fill: #4A9FD9;
  animation: droplet 1.1s linear infinite;
}

/* Flame flicker */
@keyframes flick {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(1.12); }
}
.flame { transform-origin: center bottom; animation: flick 0.45s ease-in-out infinite; }

/* Ground shake */
@keyframes quakeMove {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-3px); }
  40% { transform: translateX(2px); }
  60% { transform: translateX(-2px); }
  80% { transform: translateX(3px); }
}
.quake { animation: quakeMove 0.2s linear infinite; }


/* Standalone / tablet: toques mais confortáveis */
@media (pointer: coarse) {
  .cta, .back-btn, .home-tab, .mode-switch button { min-height: 48px; align-items: center; }
  .card { -webkit-tap-highlight-color: transparent; }
  input[type=range].chunky { min-height: 44px; }
  input[type=range].chunky::-webkit-slider-thumb { width: 36px; height: 36px; margin-top: -14px; }
  input[type=range].chunky::-moz-range-thumb { width: 36px; height: 36px; }
}

  <script type="text/babel">
// Cartoon SVG scenes for each disaster. They react to the simulation state.

// --- Shared helpers ---
const Sun = ({ x, y, r = 18, withSmile = false, color = '#FFD23F' }) => (
  <g>
    <circle cx={x} cy={y} r={r + 6} fill={color} opacity="0.25" />

    {withSmile && (
      <g stroke="#2C2A4A" strokeWidth="1.6" strokeLinecap="round" fill="none">
        <circle cx={x - 6} cy={y - 2} r="1.3" fill="#2C2A4A" stroke="none" />
        <circle cx={x + 6} cy={y - 2} r="1.3" fill="#2C2A4A" stroke="none" />
        <path d={`M ${x - 5} ${y + 4} Q ${x} ${y + 9} ${x + 5} ${y + 4}`} />
      </g>
    )}
  </g>
);

const Cloud = ({ x, y, scale = 1, dark = false }) => (
  <g transform={`translate(${x} ${y}) scale(${scale})`}>
    <ellipse cx="0" cy="0" rx="28" ry="12" fill={dark ? '#9CA3B5' : '#fff'} stroke="#2C2A4A" strokeWidth="2" />
    <ellipse cx="-14" cy="-4" rx="14" ry="11" fill={dark ? '#9CA3B5' : '#fff'} stroke="#2C2A4A" strokeWidth="2" />
    <ellipse cx="10" cy="-6" rx="16" ry="12" fill={dark ? '#9CA3B5' : '#fff'} stroke="#2C2A4A" strokeWidth="2" />
  </g>
);

const Tree = ({ x, y, scale = 1, burnt = false, fallen = false }) => {
  const angle = fallen ? -45 : 0;
  return (
    <g transform={`translate(${x} ${y}) scale(${scale}) rotate(${angle})`}>
      <rect x="-4" y="-6" width="8" height="22" fill="#7B4A2D" stroke="#2C2A4A" strokeWidth="2" />
      <circle cx="0" cy="-18" r="18" fill={burnt ? '#5C5048' : '#5B8F4A'} stroke="#2C2A4A" strokeWidth="2" />

        <>
          <circle cx="-8" cy="-22" r="10" fill="#6BBE5E" stroke="#2C2A4A" strokeWidth="2" />
          <circle cx="9" cy="-24" r="11" fill="#6BBE5E" stroke="#2C2A4A" strokeWidth="2" />
        </>
      )}
    </g>
  );
};

const House = ({ x, y, scale = 1, color = '#E8845C', tilt = 0, cracked = false, submergedY = null }) => {

const Hill = ({ cx, cy, rx, ry, color = '#5B8F4A' }) => (

);

const SceneCheias = ({ vars, damage, intensity, active }) => {
  // water level rises from baseline based on damage; rain density based on intensity
  const W = 800, H = 500;

  const rainCount = Math.round(20 + intensity * 50);
  const numTrees = Math.max(2, Math.round((vars.arvores / 100) * 8));
  const damStrength = vars.barragem / 100; // 0..1

  const damTop = 320 - damStrength * 50;

  return (

      <Hill cx={620} cy={350} rx={260} ry={110} color="#6BBE5E" />

      {/* trees on hills - sponge effect */}
      {Array.from({ length: numTrees }).map((_, i) => {
        const xs = [70, 140, 220, 290, 540, 620, 700, 760];

        <rect x="380" y={damTop + 14} width={W - 380} height={H - damTop - 14} fill="#4A9FD9" opacity="0.5" />
      </g>

      {/* houses on plain */}
      <House x={460} y={356} scale={1} color="#E8845C" />

        </g>

      {vars.alerta > 50 && (
        <g transform="translate(680 220)">
          <rect x="-30" y="-26" width="60" height="48" rx="8" fill="#FFFDF7" stroke="#2C2A4A" strokeWidth="2.5" />

// =====================================================
// TERRAMOTOS scene
// =====================================================
const SceneTerramotos = ({ vars, damage, intensity, active }) => {
  const W = 800, H = 500;
  const antiseismicLevel = vars.antissismico / 100;
  const sensorOn = vars.sensores > 25;
  const alertOn = vars.alerta_eq > 30;
  const schoolOn = vars.simulacro > 25;
  const isShaking = active && damage > 0.15;
  const crackVisible = damage > 0.1;

  // building damage = inverse of antiseismic
  const buildingTilt = damage * (1 - antiseismicLevel) * 18; // degrees
  const buildingCrack = damage > 0.3 && antiseismicLevel < 0.6;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="skyEq" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#9FD9F0" />
          <stop offset="1" stopColor="#D6E9F2" />
        </linearGradient>
      </defs>
      <rect width={W} height={H} fill="url(#skyEq)" />
      <Sun x={120} y={80} r={26} withSmile color="#FFD23F" />
      <Cloud x={550} y={70} scale={1.2} />

      {/* mountains */}
      <Hill cx={100} cy={400} rx={220} ry={100} color="#A8B6C8" />
      <Hill cx={700} cy={420} rx={240} ry={100} color="#8B98A8" />

      <g className={isShaking ? 'quake' : ''}>
        {/* buildings */}
        <g transform="translate(180 380)">
          <g transform={`rotate(${-buildingTilt})`} style={{ transformOrigin: '0 0' }}>
            <rect x="-30" y="-130" width="60" height="130" fill="#C9A06B" stroke="#2C2A4A" strokeWidth="2.5" />
            <rect x="-30" y="-138" width="60" height="10" fill="#A85439" stroke="#2C2A4A" strokeWidth="2.5" />
            {[0, 1, 2, 3].map(row =>
              [0, 1].map(col => (
                <rect key={`${row}-${col}`}
                  x={-22 + col * 22} y={-118 + row * 28}

                  fill={damage > 0.4 && (row + col) % 2 === 0 ? '#5C5048' : '#FFD23F'}

            {buildingCrack && (
              <path d="M -10 -130 L -6 -90 L -12 -50 L -4 -10" stroke="#2C2A4A" strokeWidth="3" fill="none" strokeLinecap="round" />
            )}
          </g>
        </g>

        <g transform="translate(310 380)">
          <g transform={`rotate(${buildingTilt * 0.7})`} style={{ transformOrigin: '0 0' }}>
            <rect x="-26" y="-100" width="52" height="100" fill="#F2C28E" stroke="#2C2A4A" strokeWidth="2.5" />
            <polygon points="-30,-100 0,-118 30,-100" fill="#A85439" stroke="#2C2A4A" strokeWidth="2.5" strokeLinejoin="round" />
            {[0, 1, 2].map(row =>
              [0, 1].map(col => (
                <rect key={`${row}-${col}`}
                  x={-18 + col * 22} y={-90 + row * 28}
                  width="14" height="14"
                  fill="#FFD23F" stroke="#2C2A4A" strokeWidth="2" />
              ))
            )}
          </g>
        </g>

        {/* School */}
        {schoolOn && (
          <g transform="translate(430 380)">
            <rect x="-40" y="-50" width="80" height="50" fill="#FFF1B8" stroke="#2C2A4A" strokeWidth="2.5" />
            <polygon points="-44,-50 0,-78 44,-50" fill="#E8845C" stroke="#2C2A4A" strokeWidth="2.5" strokeLinejoin="round" />
            <rect x="-30" y="-30" width="14" height="16" fill="#4A9FD9" stroke="#2C2A4A" strokeWidth="2" />
            <rect x="16" y="-30" width="14" height="16" fill="#4A9FD9" stroke="#2C2A4A" strokeWidth="2" />
            <rect x="-7" y="-26" width="14" height="26" fill="#5B3422" stroke="#2C2A4A" strokeWidth="2" />

          </g>
        )}

        <House x={555} y={380} scale={1.1} color="#E8845C" tilt={damage > 0.5 ? 6 : 0} cracked={damage > 0.6} />
        <House x={650} y={380} scale={1} color="#F2C28E" tilt={damage > 0.4 ? -4 : 0} />
        <House x={735} y={380} scale={0.9} color="#FFFDF7" />
      </g>

      {/* ground */}
      <rect x="0" y={380} width={W} height={H - 380} fill="#C9A06B" />

          <path d={isShaking

          <rect x="-16" y="-2" width="28" height="3" fill="#D9D6CC" />
          <rect x="-16" y="4" width="22" height="3" fill="#D9D6CC" />

  );
};

  const houseTilt = damage * (1 - estr) * 16;
  const strikes = Math.max(0, Math.round(damage * 8 * (1 - elec * 0.9)));
  const rainCount = Math.round(18 + intensity * 48);
  const hasRadar = vars.previsao > 28;
  const showRotas = vars.rotas > 32;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="skyTemp" x1="0" x2="0" y1="0" y2="1">

      {Array.from({ length: rainCount }).map((_, i) => {

          <line key={i} x1={x} y1={-8} x2={x - 8} y2={6}

            style={{ animationDelay: `${delay}s` }} />

      {/* wind streaks */}

          <path d="M -22 -38 Q0 -52 22 -38" fill="none" stroke="#2C2A4A" strokeWidth="2.5" />

      <House x={720} y={368} scale={0.9} color="#E8845C" tilt={damage > 0.5 ? -5 : 0} />

      {Array.from({ length: strikes }).map((_, i) => {

        return (
          <path key={`L${i}`} d={`M ${x} 40 L ${x - 8} 95 L ${x + 4} 95 L ${x - 6} 160`}

        </g>
      )}

};

  const riverW = Math.max(40, 220 * (1 - damage * 0.75) * (0.35 + med * 0.65));
  const treeGreen = fl * (1 - damage * 0.6);

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="skySeca" x1="0" x2="0" y1="0" y2="1">

      {damage > 0.2 && (

      {reus > 0.32 && (
        <g transform="translate(640 320)">

      <House x={380} y={378} scale={1} color="#E8845C" />
      <House x={460} y={378} scale={0.9} color="#F2C28E" />
      <House x={700} y={378} scale={0.85} color="#FFFDF7" />

      {damage > 0.25 && (

  );
};

// =====================================================
// DESLIZAMENTOS scene
// =====================================================
const SceneDeslizamentos = ({ vars, damage, intensity, active }) => {
  const W = 800, H = 500;
  const ch = vars.chuva / 100;
  const dr = vars.drenagem / 100;
  const enc = vars.encosta / 100;
  const rainCount = Math.round(12 + intensity * 40 * (0.4 + ch * 0.6));
  const mudShift = damage * 140 * (1 - dr * 0.45) * (1 - enc * 0.15);
  const numTrees = Math.max(2, Math.round(3 + enc * 6));

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="skyDesliz" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#8FA8BC" />
          <stop offset="1" stopColor="#C5D6E6" />

      <Cloud x={130} y={55} scale={1.2} dark />
      <Cloud x={400} y={40} scale={1.4} dark />
      <Cloud x={650} y={60} scale={1.1} dark />

      {Array.from({ length: rainCount }).map((_, i) => {
        const x = (i * 43) % W + 12;
        const delay = (i % 10) * 0.09;
        return (
          <line key={i} x1={x} y1={-6} x2={x - 5} y2={8}
            stroke="#6B8FA8" strokeWidth="2" strokeLinecap="round"
            className="raindrop"
            style={{ animationDelay: `${delay}s` }} />
        );
      })}

      {/* mountain */}
      <path d="M 0 120 L 180 280 L 340 100 L 520 240 L 800 160 L 800 500 L 0 500 Z"
        fill="#7A9A6E" stroke="#2C2A4A" strokeWidth="2.5" strokeLinejoin="round" />

      {dr > 0.28 && (
        <g opacity="0.95">
          <path d="M 280 260 L 300 380 L 320 260" fill="none" stroke="#4A9FD9" strokeWidth="8" strokeLinecap="round" />
          <path d="M 400 200 L 415 360 L 430 200" fill="none" stroke="#4A9FD9" strokeWidth="6" strokeLinecap="round" />

      )}

      {Array.from({ length: numTrees }).map((_, i) => {
        const xs = [120, 200, 260, 340, 450, 520];
        const ys = [250, 270, 240, 260, 230, 255];
        return <Tree key={i} x={xs[i] ?? 150 + i * 70} y={ys[i] ?? 260} scale={0.85} />;
      })}

      {/* village */}
      <House x={580} y={372} scale={1} color="#E8845C" tilt={damage > 0.35 ? -8 : 0} cracked={damage > 0.5} />
      <House x={660} y={372} scale={0.95} color="#F2C28E" tilt={damage > 0.4 ? 6 : 0} />
      <House x={740} y={372} scale={0.9} color="#FFFDF7" />

      {/* mudslide mass */}
      {damage > 0.08 && (
        <g transform={`translate(${mudShift} 0)`}>
          <path d="M 180 200 Q 320 320 520 380 L 800 420 L 800 500 L 120 500 L 80 280 Z"
            fill="#8B6B4A" stroke="#2C2A4A" strokeWidth="2.5" opacity={0.75 + damage * 0.2} />
          <path d="M 200 260 Q 340 360 560 400" stroke="#5C4030" strokeWidth="3" fill="none" opacity="0.5" />
        </g>
      )}

      <rect x="0" y={380} width={W} height={H - 380} fill="#C9A06B" />
      <rect x="0" y={380} width={W} height="4" fill="#7B4A2D" />

      {vars.alertas_risco > 34 && (
        <g transform="translate(720 200)">
          <rect x="-28" y="-30" width="56" height="56" rx="8" fill="#FFFDF7" stroke="#2C2A4A" strokeWidth="2.5" />
          <rect x="-20" y="-22" width="40" height="10" fill="#E8513D" />
          <text x="0" y="-14.5" fontSize="6" fill="#fff" fontFamily="Fredoka" fontWeight="700" textAnchor="middle">RISCO</text>
          <rect x="-18" y="-6" width="32" height="3" fill="#D9D6CC" />
          <rect x="-18" y="0" width="26" height="3" fill="#D9D6CC" />

      )}

  );
};

const Scene = ({ disasterId, ...rest }) => {
  if (disasterId === 'cheias') return <SceneCheias {...rest} />;
  if (disasterId === 'incendios') return <SceneIncendios {...rest} />;
  if (disasterId === 'terramotos') return <SceneTerramotos {...rest} />;
  if (disasterId === 'tempestades') return <SceneTempestades {...rest} />;
  if (disasterId === 'secas') return <SceneSecas {...rest} />;
  if (disasterId === 'deslizamentos') return <SceneDeslizamentos {...rest} />;
  return <ScenePlaceholder name={rest.name || '...'} />;
};

  <script type="text/babel">
// Main app for the Ciência vs. Catástrofes simulator
const { useState, useEffect, useMemo } = React;

/** Orçamento fixo: repartir pontos entre controlos (impossível “máximo em tudo”). */
const BUDGET_TOTAL = 150;
const BUDGET_MIN = 10;
/** Cada movimento dos controlos altera valores em passos de 5 (mais claro em tablet). */
const BUDGET_STEP = 5;

const budgetQuant = (x) => Math.round(Number(x) / BUDGET_STEP) * BUDGET_STEP;

/** Converte pontos (soma = BUDGET_TOTAL) na escala 0–100 usada pelo motor e pelas cenas. */
const pointsToEngineHundred = (pointsMap, variables) => {
  const n = variables.length;
  const mid = BUDGET_TOTAL / n;
  const scale = 50 / mid;
  const o = {};
  variables.forEach(v => {
    const p = Number(pointsMap[v.id]) || 0;
    o[v.id] = Math.min(100, Math.round(p * scale));
  });
  return o;
};

/** Garante soma = BUDGET_TOTAL e cada id entre BUDGET_MIN e o máximo possível. */
const finalizeBudget = (out, ids) => {
  const o = { ...out };
  let loop = 0;
  while (loop++ < 120) {
    const sum = ids.reduce((a, id) => a + (o[id] ?? 0), 0);
    const gap = BUDGET_TOTAL - sum;
    if (gap === 0) break;
    const step = Math.abs(gap) >= BUDGET_STEP ? BUDGET_STEP : 1;
    const adj = gap > 0 ? Math.min(step, gap) : Math.max(-step, gap);
    if (gap > 0) {
      const cand = ids
        .filter(id => {
          const others = ids.filter(i => i !== id);
          const maxV = BUDGET_TOTAL - BUDGET_MIN * others.length;
          return (o[id] ?? 0) + adj <= maxV;
        })
        .sort((a, b) => (o[b] ?? 0) - (o[a] ?? 0))[0];
      if (!cand) break;
      o[cand] += adj;
    } else {
      const cand = ids
        .filter(id => (o[id] ?? 0) + adj >= BUDGET_MIN)
        .sort((a, b) => (o[b] ?? 0) - (o[a] ?? 0))[0];
      if (!cand) break;
      o[cand] += adj;
    }
  }
  return o;
};

const buildInitialBudget = (disaster) => {
  const vars = disaster.variables;
  const ids = vars.map(v => v.id);
  const sumD = vars.reduce((s, v) => s + v.default, 0) || 1;
  const floats = ids.map((_, i) => (BUDGET_TOTAL * vars[i].default) / sumD);
  let ints = floats.map(x => Math.floor(x));
  let diff = BUDGET_TOTAL - ints.reduce((a, b) => a + b, 0);
  const frac = floats.map((x, i) => x - ints[i]);
  const order = ids.map((_, i) => i).sort((a, b) => frac[b] - frac[a]);
  for (let k = 0; k < diff; k++) ints[order[k % ids.length]]++;
  const out = {};
  ids.forEach((id, i) => { out[id] = ints[i]; });
  for (let iter = 0; iter < 80; iter++) {
    const low = ids.find(id => out[id] < BUDGET_MIN);
    if (!low) break;
    const need = BUDGET_MIN - out[low];
    const donor = ids.filter(id => id !== low && out[id] > BUDGET_MIN).sort((a, b) => out[b] - out[a])[0];
    if (!donor) {
      out[low] = BUDGET_MIN;
      break;
    }
    const take = Math.min(need, out[donor] - BUDGET_MIN);
    out[donor] -= take;
    out[low] += take;
  }
  ids.forEach(id => {
    out[id] = budgetQuant(out[id]);
    if (out[id] < BUDGET_MIN) out[id] = BUDGET_MIN;
  });
  return finalizeBudget(out, ids);
};

/** Reparte `rem` entre `others`, cada um múltiplo de BUDGET_STEP e ≥ BUDGET_MIN. */
const distributeRemAmongOthers = (rem, others, prev) => {
  const k = others.length;
  const minTotal = BUDGET_MIN * k;
  const out = {};
  if (rem < minTotal) {
    others.forEach(id => { out[id] = BUDGET_MIN; });
    return out;
  }
  const pool = rem - minTotal;
  const flex = others.map(id => Math.max(0, (prev[id] ?? BUDGET_MIN) - BUDGET_MIN));
  const sF = flex.reduce((a, b) => a + b, 0);
  const poolUnits = pool / BUDGET_STEP;

  if (pool <= 0 || sF === 0) {
    const remUnits = Math.round(rem / BUDGET_STEP);
    const minUnits = (BUDGET_MIN / BUDGET_STEP) * k;
    const extra = remUnits - minUnits;
    const baseU = Math.floor(extra / k);
    const remainder = extra - baseU * k;
    others.forEach((id, i) => {
      out[id] = BUDGET_MIN + (baseU + (i < remainder ? 1 : 0)) * BUDGET_STEP;
    });
    return out;
  }

  const rawU = others.map((_, i) => (poolUnits * flex[i]) / sF);
  let units = rawU.map(u => Math.floor(u));
  let deficit = Math.round(poolUnits) - units.reduce((a, b) => a + b, 0);
  const ord = others.map((_, i) => i).sort((a, b) => (rawU[b] - units[b]) - (rawU[a] - units[a]));
  for (let t = 0; t < deficit; t++) units[ord[t % ord.length]]++;
  others.forEach((id, i) => {
    out[id] = BUDGET_MIN + units[i] * BUDGET_STEP;
  });
  return out;
};

/** Ao mover um control, os outros ajustam-se para manter a soma em BUDGET_TOTAL (passos de BUDGET_STEP). */
const redistributeBudget = (prev, disaster, changedId, rawNew) => {
  const ids = disaster.variables.map(v => v.id);
  const others = ids.filter(id => id !== changedId);
  const maxC = BUDGET_TOTAL - BUDGET_MIN * others.length;
  let nv = Math.max(BUDGET_MIN, Math.min(Math.round(Number(rawNew)), maxC));
  nv = budgetQuant(nv);
  nv = Math.max(BUDGET_MIN, Math.min(nv, maxC));
  const rem = BUDGET_TOTAL - nv;
  const otherPart = distributeRemAmongOthers(rem, others, prev);
  const out = { ...otherPart, [changedId]: nv };
  return finalizeBudget(out, ids);
};

// ---------- helpers ----------
const computeProtection = (disaster, pointsMap) => {
  const eff = pointsToEngineHundred(pointsMap, disaster.variables);
  const totalWeight = disaster.variables.reduce((s, v) => s + v.weight, 0);
  const weighted = disaster.variables.reduce((s, v) => s + (eff[v.id] ?? 0) * v.weight, 0);
  return Math.min(1, (weighted / totalWeight) / 100);
};

const computeOutcome = (disaster, pointsMap, intensity) => {
  const protection = computeProtection(disaster, pointsMap);
  // damage: how badly things were hit
  const rawDamage = Math.max(0, intensity - protection * 0.95);
  const damage = Math.min(1, rawDamage);

  const buildingsPct = Math.round(Math.max(0, Math.min(100, (1 - damage) * 100)));
  const peopleSaved = Math.round(disaster.population * (1 - damage * 0.85));
  const score = Math.round((protection - intensity * 0.4) * 100 + 60); // rough
  let stars = 1;
  if (buildingsPct >= 90) stars = 3;
  else if (buildingsPct >= 70) stars = 2;
  return { protection, damage, buildingsPct, peopleSaved, stars };
};

const ratingLabel = (stars) => stars >= 3 ? 'Cientista de Topo!' : stars === 2 ? 'Boa Defesa!' : 'Podes melhorar!';

/** Dicas pós-resultado: gera texto a partir dos controlos e de RESULT_POST_TIPS (data.js). */
const buildPostSimulationAdvice = (disaster, outcome, values, factIndex) => {
  const pool = (typeof RESULT_POST_TIPS !== 'undefined' && RESULT_POST_TIPS[disaster.id])
    ? RESULT_POST_TIPS[disaster.id]
    : [
        'Em casa, combina um plano simples: quem avisa quem e para onde vais em emergência.',
        'Apoiar ciência e tecnologia na escola e na comunidade constrói defesas para todos.'
      ];
  const tips = [];
  if (pool.length) {
    tips.push(pool[((factIndex ?? 0) + disaster.id.length) % pool.length]);
    const t2 = pool[((factIndex ?? 0) + disaster.id.length + 1) % pool.length];
    if (t2 !== tips[0]) tips.push(t2);
  }

  const eff = pointsToEngineHundred(values, disaster.variables);
  const scored = disaster.variables.map(v => ({
    name: v.name,
    hint: v.hint,
    val: eff[v.id] ?? 0,
    pts: values[v.id] ?? 0
  }));
  const sortedAsc = [...scored].sort((a, b) => a.val - b.val);
  const sortedDesc = [...scored].sort((a, b) => b.val - a.val);

  const praiseLines = [];
  const minPraise = outcome.stars >= 3 ? 58 : 54;
  if (outcome.stars >= 2) {
    sortedDesc.forEach(v => {
      if (v.val >= minPraise && praiseLines.length < 3) {
        praiseLines.push(
          `«${v.name}» com ${Math.round(v.pts)} pontos esteve forte: ${v.hint} — ajudou a proteger pessoas e o ambiente.`
        );
      }
    });
    if (praiseLines.length === 0) {
      praiseLines.push(
        'A soma das tuas escolhas criou mais “camadas” de proteção: lembra-te que prevenção raramente depende de uma só medida.'
      );
    }
  }

  const showImprove = outcome.stars < 2 || outcome.damage > 0.26;
  const improveLines = [];
  if (showImprove) {
    sortedAsc.forEach(v => {
      if (v.val < 56 && improveLines.length < 3) {
        improveLines.push(
          `Podes tentar dar mais pontos a «${v.name}» (tinhas ${Math.round(v.pts)}; o mínimo útil na escala do jogo costuma ser subir os mais fracos): ${v.hint}.`
        );
      }
    });
    if (improveLines.length === 0) {
      improveLines.push(
        'Tenta repartir os 150 pontos de forma mais equilibrada — muitas defesas só funcionam bem em equipa, como na vida real.'
      );
    }
  }

  return {
    tips,
    praiseLines,
    improveLines,
    showPraise: outcome.stars >= 2,
    showImprove
  };
};

  const sceneVars = useMemo(
    () => pointsToEngineHundred(values, disaster.variables),
    [values, disaster]
  );

  const budgetUsed = useMemo(
    () => disaster.variables.reduce((s, v) => s + (values[v.id] ?? 0), 0),
    [disaster, values]
  );

  const maxSlider = BUDGET_TOTAL - BUDGET_MIN * (disaster.variables.length - 1);
  useEffect(() => {
    if (mode !== 'livre') return;
    const tips = MASCOT_TIPS[disaster.id] || [];
    if (!tips.length) return;
    const id = setInterval(() => setTipIndex(i => (i + 1) % tips.length), 6000);
    return () => clearInterval(id);
  }, [mode, disaster.id]);

  // Mission countdown
  useEffect(() => {
    if (mode !== 'missao' || missionState !== 'running') return;
    if (timeLeft <= 0) {
      // run disaster
      setMissionState('over');
      // intensity peaks at end
      setIntensity(0.88);
      setTimeout(() => setShowResult(true), 900);
      return;
    }
    const id = setTimeout(() => {
      setTimeLeft(t => t - 1);
      // gradually rise intensity for visual tension
      setIntensity(i => Math.min(0.6, i + 0.02));
    }, 1000);
    return () => clearTimeout(id);
  }, [mode, missionState, timeLeft]);

  const startMission = () => {
    setTimeLeft(45);
    setIntensity(0.1);
    setMissionState('running');
    setShowResult(false);
  };

  const onModeChange = (newMode) => {
    setMode(newMode);
    setMissionState('idle');
    setTimeLeft(45);
    setIntensity(0);
    setShowResult(false);
  };

  const reset = () => {
    setValues(buildInitialBudget(disaster));
    setMissionState('idle');
    setTimeLeft(45);
    setIntensity(0);
    setShowResult(false);
  };

  const trySimulateLivre = () => {
    setIntensity(0.85);
    setMissionState('over'); // freezes UI for visualisation
    setTimeout(() => setShowResult(true), 1000);
  };

  const closeResult = () => {
    setShowResult(false);
    if (mode === 'missao') {
      setMissionState('idle');
      setTimeLeft(45);
      setIntensity(0);
    } else {
      setMissionState('idle');
      setIntensity(0);
    }
    setFactIndex(i => (i + 1) % (disaster.facts?.length || 1));
  };

  const sliderDisabled = mode === 'missao' && missionState === 'over';

  const currentTip = (() => {
    const tips = MASCOT_TIPS[disaster.id] || [];
    if (!tips.length) return '';
    if (mode === 'missao' && missionState === 'running') {
      return `Faltam ${timeLeft}s! Reparte bem os 150 pontos — as decisões contam.`;
    }
    if (mode === 'missao' && missionState === 'over') {
      return 'A catástrofe aconteceu! Vamos ver os resultados...';
    }
    return tips[tipIndex];
  })();

  return (
    <div className="app">
      {/* Top bar */}
      <div className="sim-top">
        <button className="back-btn" onClick={onBack}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
            <path d="M15 18 L9 12 L15 6" />
          </svg>
          Voltar
        </button>

        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1, justifyContent: 'center' }}>
          <h1 className="h-title" style={{ fontSize: 28 }}>
            <span style={{ fontSize: 28, marginRight: 8 }}>{disaster.emoji}</span>
            {disaster.name}
          </h1>
        </div>

        <div className="mode-switch" role="tablist">
          <button className={mode === 'livre' ? 'on' : ''} onClick={() => onModeChange('livre')}>🧪 Livre</button>
          <button className={mode === 'missao' ? 'on' : ''} onClick={() => onModeChange('missao')}>🎯 Missão</button>
        </div>
      </div>

      <div className="sim-grid">
        {/* Left: variables */}
        <div className="panel">
          <div className="panel-head">
            <h3>Ciência e tecnologia</h3>
            <span style={{ fontSize: 12, fontWeight: 800, color: 'var(--ink-soft)' }}>
              {mode === 'livre'
                ? `150 pontos no total — cada passo move ${BUDGET_STEP} pontos; os outros ajustam-se (mín. ${BUDGET_MIN} em cada)`
                : 'Reparte 150 pontos antes do tempo acabar'}
            </span>
          </div>

          <div className="budget-strip" aria-live="polite">
            <span className="budget-strip-total">{budgetUsed}/{BUDGET_TOTAL} pontos usados</span>
            <span className="budget-strip-hint">Não dá para maximizar tudo: é preciso escolher prioridades.</span>
          </div>

          {disaster.teachIntro && (
            <div className="sim-teach" role="region" aria-label="Sobre esta catástrofe">
              <p className="sim-teach-label">Sobre esta catástrofe</p>
              <p className="sim-teach-text">{disaster.teachIntro}</p>
            </div>
          )}

          <div className="mascot-row">
            <MascotMini size={56} mood={outcome.stars >= 2 || mode === 'livre' ? 'happy' : 'happy'} />
            <div className="bubble">{currentTip}</div>
          </div>

          <div className="panel-body">
            {disaster.variables.map(v => {
              const sb = v.strand ? strandBadge(v.strand) : null;
              return (
                <div key={v.id} className="var">
                  <div className="var-top">
                    <div className="var-icon" style={{ background: v.color }}>
                      <VarIcon name={v.icon} />
                    </div>
                    <div className="var-text">
                      <h4 className="var-name">{v.name}</h4>
                      <p className="var-hint">{v.hint}</p>
                      {sb && (
                        <span className={sb.className} title="Ligação ao trabalho de Ciência e Tecnologia">
                          <span className="strand-emoji" aria-hidden="true">{sb.emoji}</span>
                          {sb.label}
                        </span>
                      )}
                    </div>
                    <div className="var-val">{values[v.id]} <span className="var-pts">pts</span></div>
                  </div>
                  <input
                    type="range" min={BUDGET_MIN} max={maxSlider} step={BUDGET_STEP}
                    className="chunky"
                    value={values[v.id]}
                    disabled={sliderDisabled}
                    onChange={e => setValues(prev => redistributeBudget(prev, disaster, v.id, Number(e.target.value)))}
                  />
                  {v.preventExplain && (
                    <div className="var-prevent">
                      <p className="var-prevent-title">Como isto ajuda a prevenir?</p>
                      <p className="var-prevent-text">{v.preventExplain}</p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="sim-actions">
            {mode === 'livre' && (
              <>
                <button className="cta" onClick={trySimulateLivre}>
                  ▶ Simular catástrofe
                </button>
                <button className="cta ghost" onClick={reset}>↻ Repor</button>
              </>
            )}
            {mode === 'missao' && missionState === 'idle' && (
              <>
                <button className="cta big green" onClick={startMission}>
                  🎯 Começar missão (45s)
                </button>
                <button className="cta ghost" onClick={reset}>↻ Repor</button>
              </>
            )}
            {mode === 'missao' && missionState === 'running' && (
              <button className="cta ghost" onClick={() => { setMissionState('over'); setIntensity(0.88); setTimeout(()=>setShowResult(true),800); }}>
                ⚡ Saltar para o final
              </button>
            )}
            {mode === 'missao' && missionState === 'over' && !showResult && (
              <button className="cta" onClick={() => setShowResult(true)}>Ver resultado</button>
            )}
          </div>
        </div>

        {/* Right: scene + live stats */}
        <div className="panel">
          <div className="panel-head">
            <h3>Cenário</h3>
            <span style={{ fontSize: 12, fontWeight: 800, color: 'var(--ink-soft)' }}>
              Intensidade: {mode === 'livre' ? 'Pré-visualização' : (missionState === 'running' ? 'A aproximar...' : missionState === 'over' ? 'CATÁSTROFE!' : 'Em espera')}
            </span>
          </div>

          <div className="scene-wrap">
            <Scene
              disasterId={disaster.id}
              vars={sceneVars}
              damage={outcome.damage}
              intensity={liveIntensity}
              active={mode === 'missao'}
              name={disaster.name}
            />
            {/* Protection meter */}
            <div className="scene-meter">
              <span className="mlabel">Proteção</span>
              <div className="bar">
                <div style={{
                  width: `${Math.round(outcome.protection * 100)}%`,
                  background: outcome.protection > 0.66 ? '#6BBE5E' : outcome.protection > 0.33 ? '#FFD23F' : '#E8513D'
                }} />
              </div>
              <span style={{ fontVariantNumeric: 'tabular-nums' }}>{Math.round(outcome.protection * 100)}%</span>
            </div>
            {/* Timer (mission running) */}
            {mode === 'missao' && missionState === 'running' && (
              <div className={`timer-pill ${timeLeft <= 10 ? 'warn' : ''}`}>
                <span className="pulse" />
                {timeLeft}s
              </div>
            )}
            {mode === 'missao' && missionState === 'over' && (
              <div className="timer-pill warn"><span className="pulse" />FIM</div>
            )}
          </div>

          {/* live stats */}
          <div className="stats">
            <div className="stat">
              <div className="ico" style={{ background: '#C9F0B4' }}>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#2C2A4A" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="4" y="9" width="16" height="12" fill="#FFFDF7" />
                  <polygon points="3,9 12,3 21,9" fill="#E8845C" strokeLinejoin="round" />
                  <rect x="10" y="13" width="4" height="8" fill="#5B3422" />
                </svg>
              </div>
              <div>
                <div className="label">Edifícios protegidos</div>
                <div className="val">{outcome.buildingsPct}%</div>
              </div>
            </div>
            <div className="stat">
              <div className="ico" style={{ background: '#FFE7B8' }}>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#2C2A4A" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="8" r="4" fill="#F5D5B3" />
                  <path d="M4 21 Q4 14 12 14 Q20 14 20 21" fill="#4A9FD9" />
                </svg>
              </div>
              <div>
                <div className="label">Pessoas a salvo</div>
                <div className="val">{outcome.peopleSaved.toLocaleString('pt-PT')}</div>
              </div>
            </div>
          </div>

          <div style={{ height: 18 }} />
        </div>
      </div>

      {/* Results modal */}
      {showResult && (
        <ResultsModal
          disaster={disaster}
          outcome={outcome}
          values={values}
          onClose={closeResult}
          factIndex={factIndex}
        />
      )}

      <div style={{ height: 40 }} />
    </div>
  );
};

// ---------- Results modal ----------
const ResultsModal = ({ disaster, outcome, values, onClose, factIndex }) => {
  const fact = disaster.facts[factIndex % disaster.facts.length];
  const isWin = outcome.stars >= 2;
  const advice = useMemo(
    () => buildPostSimulationAdvice(disaster, outcome, values, factIndex),
    [disaster, outcome, values, factIndex]
  );

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="modal-head">
          <div className="stars">
            {[1, 2, 3].map(i => <Star key={i} filled={outcome.stars >= i} />)}
          </div>
          <h2>{ratingLabel(outcome.stars)}</h2>
          <p>{isWin ? HIGH_SCORE_MESSAGES[disaster.id] : LOW_SCORE_MESSAGES[disaster.id]}</p>
        </div>
        <div className="modal-body">
          <div className="result-stats">
            <div className="stat">
              <div className="ico" style={{ background: '#C9F0B4' }}>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#2C2A4A" strokeWidth="2.4" strokeLinejoin="round">
                  <rect x="4" y="9" width="16" height="12" fill="#FFFDF7" />
                  <polygon points="3,9 12,3 21,9" fill="#E8845C" />
                </svg>
              </div>
              <div>
                <div className="label">Edifícios</div>
                <div className="val">{outcome.buildingsPct}%</div>
              </div>
            </div>
            <div className="stat">
              <div className="ico" style={{ background: '#FFE7B8' }}>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#2C2A4A" strokeWidth="2.4" strokeLinejoin="round">
                  <circle cx="12" cy="8" r="4" fill="#F5D5B3" />
                  <path d="M4 21 Q4 14 12 14 Q20 14 20 21" fill="#4A9FD9" />
                </svg>
              </div>
              <div>
                <div className="label">Pessoas a salvo</div>
                <div className="val">{outcome.peopleSaved.toLocaleString('pt-PT')}</div>
              </div>
            </div>
          </div>

          {advice.showPraise && (
            <div className="modal-reflect good">
              <h4 className="modal-reflect-title">O que funcionou muito bem</h4>
              <ul className="modal-reflect-list">
                {advice.praiseLines.map((line, i) => <li key={i}>{line}</li>)}
              </ul>
            </div>
          )}

          {advice.showImprove && (
            <div className="modal-reflect improve">
              <h4 className="modal-reflect-title">O que podias fazer diferente</h4>
              <ul className="modal-reflect-list">
                {advice.improveLines.map((line, i) => <li key={i}>{line}</li>)}
              </ul>
            </div>
          )}

          {advice.tips.length > 0 && (
            <div className="modal-reflect tips">
              <h4 className="modal-reflect-title">Dicas para a vida real</h4>
              <ul className="modal-reflect-list">
                {advice.tips.map((line, i) => <li key={i}>{line}</li>)}
              </ul>
            </div>
          )}

          <div className="fact">
            <div className="ico">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#2C2A4A" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round">
                <path d="M12 3 Q5 3 5 11 Q5 14 8 16 L8 19 L16 19 L16 16 Q19 14 19 11 Q19 3 12 3 Z" fill="#FFD23F" />
                <line x1="9" y1="22" x2="15" y2="22" />
              </svg>
            </div>
            <div>
              <p className="title">{disaster.factTitle}</p>
              <p>{fact}</p>
            </div>
          </div>
        </div>
        <div className="modal-actions">
          <button className="cta green" onClick={onClose}>↻ Jogar outra vez</button>
          <button className="cta ghost" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );
};

// ---------- Root ----------
const App = () => {
  const [screen, setScreen] = useState('home'); // home | sim
  const [picked, setPicked] = useState(null);

  const pick = (id) => { setPicked(id); setScreen('sim'); window.scrollTo(0, 0); };
  const back = () => { setScreen('home'); window.scrollTo(0, 0); };

  return screen === 'home'
    ? <Home onPick={pick} />
    : <Simulator key={picked} disasterId={picked} onBack={back} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
